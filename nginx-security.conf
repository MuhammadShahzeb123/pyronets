# Pyronets — Nginx Security Hardened Configuration
# For GoDaddy VPS with Certbot SSL
# ================================================

# Rate limit zone (place in http block, not server block)
# limit_req_zone $binary_remote_addr zone=contact:10m rate=2r/m;

server {
    listen 443 ssl http2;
    server_name pyronets.com www.pyronets.com;

    # SSL (managed by Certbot — update paths to match your server)
    ssl_certificate /etc/letsencrypt/live/pyronets.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pyronets.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ===== SECURITY HEADERS =====

    # Hide Nginx version from response headers
    server_tokens off;

    # Prevent HTTPS downgrade attacks (1 year + preload)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Prevent clickjacking
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Prevent MIME-type sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # Control referrer information
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Restrict browser features
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    # Content Security Policy
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://api.web3forms.com; form-action 'self' https://api.web3forms.com; frame-ancestors 'self';" always;

    # ===== WEBSITE ROOT =====

    root /var/www/pyronets.com;
    index index.html;

    # Default location
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    # Rate limiting on contact form page
    location /contact/ {
        # limit_req zone=contact burst=5 nodelay;
        try_files $uri $uri/ $uri/index.html =404;
    }

    # Cache static assets aggressively (30 days)
    location ~* \.(css|js|svg|png|jpg|jpeg|webp|gif|ico|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Security — block access to hidden files
    location ~ /\. {
        deny all;
        return 404;
    }

    # Allow .well-known for SSL verification and security.txt
    location ^~ /.well-known/ {
        allow all;
    }

    # Block common attack vectors
    location ~* \.(asp|aspx|php|cgi|py|pl|sh|bat|exe|dll)$ {
        deny all;
        return 404;
    }

    # Custom 404 page (optional)
    error_page 404 /404.html;
}

# HTTP -> HTTPS redirect
server {
    listen 80;
    server_name pyronets.com www.pyronets.com;
    return 301 https://$server_name$request_uri;
}
